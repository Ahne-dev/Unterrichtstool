<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lehrer-Dashboard | Mathe-Trainer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            user-select: none;
            background-color: #020617;
            -webkit-font-smoothing: antialiased;
        }

        .glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .widget {
            position: absolute;
            min-width: 360px;
            min-height: 660px; /* Fenster bleibt groß genug für Brüche */
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            border-radius: 2.5rem;
            overflow: hidden;
            touch-action: none;
        }

        .widget-header {
            height: 55px;
            background: rgba(30, 41, 59, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1.25rem;
            cursor: move;
            flex-shrink: 0;
        }

        .widget-content {
            flex-grow: 1;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            pointer-events: auto;
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.5);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.2s ease;
            font-weight: 700;
        }
        .btn-glass:hover { background: rgba(255, 255, 255, 0.1); color: white; }
        .btn-glass.active {
            background: rgba(34, 211, 238, 0.2);
            border-color: rgba(34, 211, 238, 0.4);
            color: #22d3ee;
        }

        /* Zurück zur normalen Größe (2 Prompts her) */
        .math-input {
            -webkit-appearance: none;
            -moz-appearance: textfield; 
            margin: 0;
            background: transparent;
            border-bottom: 2px solid rgba(34, 211, 238, 0.2);
            width: 100%;
            text-align: center;
            font-size: 2.5rem; /* Zurückgesetzt */
            line-height: 1.2;
            font-weight: 800;
            color: #22d3ee;
            outline: none;
            transition: border-color 0.3s ease;
            padding: 0.5rem 0;
        }
        .math-input::-webkit-inner-spin-button, 
        .math-input::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        .math-input:focus { border-color: #22d3ee; }

        .correct-flash { animation: correct-pulse 0.5s ease-out; }
        @keyframes correct-pulse {
            0% { background: rgba(15, 23, 42, 0.85); }
            50% { background: rgba(34, 197, 94, 0.2); }
            100% { background: rgba(15, 23, 42, 0.85); }
        }

        .wrong-flash { animation: wrong-pulse 0.5s ease-out; }
        @keyframes wrong-pulse {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); background: rgba(239, 68, 68, 0.1); }
            75% { transform: translateX(5px); }
        }

        .resizer {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 30px;
            height: 30px;
            cursor: nwse-resize;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.1);
            z-index: 100;
        }
        .resizer:hover { color: #22d3ee; }

        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #0ea5e9;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(14, 165, 233, 0.4);
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .fab:hover { transform: scale(1.1) rotate(90deg); background: #0284c7; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-200 h-screen w-screen relative">

    <div class="fixed inset-0 z-0 opacity-10 pointer-events-none">
        <img src="https://images.unsplash.com/photo-1635070041078-e363dbe005cb?q=80&w=2000&auto=format&fit=crop" alt="Hintergrund">
    </div>

    <main id="workspace" class="relative w-full h-full z-10 overflow-hidden"></main>

    <div class="fab" onclick="spawnWidget()" title="Neues Fenster öffnen">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </div>

    <script>
        let zIndexCounter = 100;
        let widgetCount = 0;
        const workspace = document.getElementById('workspace');

        function spawnWidget() {
            const id = `widget-${Date.now()}`;
            const widget = document.createElement('div');
            widget.id = id;
            widget.className = `widget glass`;
            widget.style.zIndex = ++zIndexCounter;
            
            const wWidth = 380;
            const wHeight = 660; // Fenster bleibt groß
            widget.style.width = `${wWidth}px`;
            widget.style.height = `${wHeight}px`;
            
            const offset = (widgetCount % 6) * 35;
            widget.style.left = `${(window.innerWidth - wWidth) / 2 + offset}px`;
            widget.style.top = `${(window.innerHeight - wHeight) / 2 + offset}px`;
            widgetCount++;

            widget.innerHTML = `
                <div class="widget-header">
                    <div class="flex items-center gap-2">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22d3ee" stroke-width="3"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                        <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">Mathe-Trainer</span>
                    </div>
                    <div class="flex gap-1 pointer-events-auto">
                        <button onclick="window.resetWidget('${id}')" class="p-2 text-slate-500 hover:text-cyan-400 transition-all" title="Zurücksetzen">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                        </button>
                        <button onclick="document.getElementById('${id}').remove()" class="p-2 text-slate-500 hover:text-red-400 transition-all" title="Schließen">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
                        </button>
                    </div>
                </div>
                <div class="widget-content">
                    <div class="math-menu flex gap-2 mb-6 overflow-x-auto no-scrollbar pb-1">
                        <button onclick="window.setMathMode('${id}', 'basic', this)" class="btn-glass px-4 py-2 rounded-xl flex-1">Basis</button>
                        <button onclick="window.setMathMode('${id}', 'fraction', this)" class="btn-glass px-4 py-2 rounded-xl flex-1">Brüche</button>
                        <button onclick="window.setMathMode('${id}', 'units', this)" class="btn-glass px-4 py-2 rounded-xl flex-1">Einheiten</button>
                    </div>
                    
                    <div class="stats flex justify-between p-4 bg-white/5 rounded-2xl border border-white/5 mb-6">
                        <div class="text-center">
                            <div class="text-[8px] uppercase text-slate-500 font-bold mb-1">Richtig</div>
                            <div id="score-correct" class="text-emerald-400 font-black text-xl">0</div>
                        </div>
                        <div class="text-center">
                            <div class="text-[8px] uppercase text-slate-500 font-bold mb-1">Gesamt</div>
                            <div id="score-total" class="text-slate-400 font-black text-xl">0</div>
                        </div>
                    </div>

                    <div id="exercise-area" class="flex-grow flex flex-col items-center justify-center bg-slate-900/40 rounded-3xl border border-white/5 p-6 relative transition-all duration-300">
                        <div id="task-display" class="text-4xl font-black text-white mb-6 tracking-tighter text-center min-h-[100px] flex items-center justify-center py-4">Wähle Modus</div>
                        <div class="w-full">
                            <input type="number" id="math-answer" class="math-input" placeholder="">
                        </div>
                        <button onclick="window.checkMathAnswer('${id}')" class="w-full mt-8 bg-cyan-600 hover:bg-cyan-500 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg transition-all active:scale-95">Prüfen</button>
                    </div>
                </div>
                <div class="resizer">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 19l4-4m-9 4l9-9"/></svg>
                </div>
            `;

            workspace.appendChild(widget);
            setupDraggable(widget);
            setupResizable(widget);
            
            widget._mathState = { mode: 'idle', correct: 0, total: 0, currentAnswer: null };

            widget.querySelector('#math-answer').addEventListener('keypress', (e) => {
                if(e.key === 'Enter') window.checkMathAnswer(id);
            });
        }

        window.resetWidget = (id) => {
            const w = document.getElementById(id);
            if(!w) return;
            w._mathState.correct = 0; w._mathState.total = 0;
            w.querySelector('#score-correct').textContent = '0';
            w.querySelector('#score-total').textContent = '0';
            if(w._mathState.mode !== 'idle') window.generateMathTask(id);
        };

        window.setMathMode = (id, mode, btn) => {
            const w = document.getElementById(id);
            w._mathState.mode = mode;
            w.querySelectorAll('.btn-glass').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            window.generateMathTask(id);
        };

        window.generateMathTask = (id) => {
            const w = document.getElementById(id);
            const display = w.querySelector('#task-display');
            const input = w.querySelector('#math-answer');
            const state = w._mathState;
            input.value = ''; input.focus();

            if(state.mode === 'basic') {
                const ops = ['+', '-', '*']; const op = ops[Math.floor(Math.random()*ops.length)];
                let a = Math.floor(Math.random()*20) + 1; let b = Math.floor(Math.random()*20) + 1;
                if(op === '*') { a = Math.floor(Math.random()*10)+1; b = Math.floor(Math.random()*10)+1; }
                state.currentAnswer = eval(`${a}${op}${b}`);
                display.innerHTML = `<span class="leading-relaxed">${a} <span class="text-cyan-400 mx-2">${op.replace('*','×')}</span> ${b}</span>`;
            } 
            else if(state.mode === 'fraction') {
                const den = Math.floor(Math.random()*8)+2;
                const num1 = Math.floor(Math.random()*den)+1; const num2 = Math.floor(Math.random()*den)+1;
                state.currentAnswer = num1 + num2;
                display.innerHTML = `<div class="flex items-center gap-6 py-4"><div class="flex flex-col items-center"><span>${num1}</span><div class="w-10 h-1 bg-white/50 my-2"></div><span>${den}</span></div><span class="text-cyan-400 text-3xl font-black">+</span><div class="flex flex-col items-center"><span>${num2}</span><div class="w-10 h-1 bg-white/50 my-2"></div><span>${den}</span></div></div>`;
            }
            else if(state.mode === 'units') {
                const types = [{from: 'km', to: 'm', f: 1000},{from: 'm', to: 'cm', f: 100},{from: 'kg', to: 'g', f: 1000},{from: 'l', to: 'ml', f: 1000}];
                const type = types[Math.floor(Math.random()*types.length)];
                const val = Math.floor(Math.random()*10)+1;
                state.currentAnswer = val * type.f;
                display.innerHTML = `<div class="flex items-baseline gap-2 leading-loose">${val}<span class="text-sm text-slate-400 font-bold uppercase">${type.from}</span><span class="text-cyan-400 mx-2">=</span>...<span class="text-sm text-slate-400 font-bold uppercase">${type.to}</span></div>`;
            }
        };

        window.checkMathAnswer = (id) => {
            const w = document.getElementById(id);
            const input = w.querySelector('#math-answer');
            const area = w.querySelector('#exercise-area');
            const state = w._mathState;
            const val = parseFloat(input.value);
            if(isNaN(val) || state.mode === 'idle') return;

            state.total++;
            if(val === state.currentAnswer) {
                state.correct++;
                area.classList.add('correct-flash');
                confetti({ particleCount: 25, spread: 50, origin: { x: (w.offsetLeft + w.offsetWidth/2) / window.innerWidth, y: (w.offsetTop + w.offsetHeight/2) / window.innerHeight } });
                setTimeout(() => area.classList.remove('correct-flash'), 500);
            } else {
                area.classList.add('wrong-flash');
                setTimeout(() => area.classList.remove('wrong-flash'), 500);
            }
            w.querySelector('#score-correct').textContent = state.correct;
            w.querySelector('#score-total').textContent = state.total;
            setTimeout(() => window.generateMathTask(id), 600);
        };

        function setupDraggable(el) {
            let dragging = false; let sX, sY, iX, iY;
            const header = el.querySelector('.widget-header');
            header.onpointerdown = (e) => {
                if (e.target.closest('button')) return;
                dragging = true; el.style.zIndex = ++zIndexCounter;
                sX = e.clientX; sY = e.clientY; iX = el.offsetLeft; iY = el.offsetTop;
                header.setPointerCapture(e.pointerId);
            };
            header.onpointermove = (e) => {
                if (!dragging) return;
                el.style.left = `${iX + (e.clientX - sX)}px`;
                el.style.top = `${iY + (e.clientY - sY)}px`;
            };
            header.onpointerup = () => { dragging = false; };
        }

        function setupResizable(el) {
            const resizer = el.querySelector('.resizer');
            let resizing = false; let sX, sY, sW, sH;
            resizer.onpointerdown = (e) => {
                e.stopPropagation(); resizing = true;
                sX = e.clientX; sY = e.clientY; sW = el.offsetWidth; sH = el.offsetHeight;
                resizer.setPointerCapture(e.pointerId);
            };
            resizer.onpointermove = (e) => {
                if (!resizing) return;
                el.style.width = `${Math.max(340, sW + (e.clientX - sX))}px`;
                el.style.height = `${Math.max(480, sH + (e.clientY - sY))}px`;
            };
            resizer.onpointerup = () => { resizing = false; };
        }

        window.onload = () => spawnWidget();
    </script>
</body>
</html>
